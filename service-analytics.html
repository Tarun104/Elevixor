<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Analytics & Dashboards Inquiry - Elevixor</title>
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0f172a; color: #e2e8f0; }
        .page-wrap { min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 24px 24px 48px 24px; }
        .form-card { width: 100%; max-width: 720px; background: rgba(15, 23, 42, 0.94); border: 1px solid rgba(96, 165, 250, 0.18); border-radius: 24px; box-shadow: 0 40px 120px rgba(15, 23, 42, 0.45); padding: 36px; }
        h1 { margin: 0 0 16px; font-size: 32px; color: #60a5fa; }
        p.description { margin: 0 0 28px; color: #cbd5e1; line-height: 1.7; }
        .form-grid { display: grid; gap: 20px; }
        .form-group { display: grid; gap: 10px; }
        .form-label { font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; color: #94a3b8; }
        .form-input, .form-select, .form-textarea { width: 100%; background: rgba(15, 23, 42, 0.72); border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 14px; color: #f8fafc; padding: 14px 16px; font-size: 15px; }
        .form-select option { background: #0f172a; color: #f8fafc; }
        .form-select option:hover { background: rgba(96, 165, 250, 0.12); }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #60a5fa; box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.12); }
        .form-textarea { min-height: 140px; resize: vertical; }
        .form-submit { border: none; border-radius: 14px; padding: 16px 24px; font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #60a5fa, #2563eb); color: white; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .form-submit:hover { transform: translateY(-2px); box-shadow: 0 16px 40px rgba(37, 99, 235, 0.3); }
        .message { display: none; margin-top: 18px; padding: 18px 20px; border-radius: 14px; }
        .message.success { background: rgba(16, 185, 129, 0.12); color: #a7f3d0; }
        .message.error { background: rgba(239, 68, 68, 0.12); color: #fecaca; }
        .message.show { display: block; }
        @media (max-width: 640px) { .form-card { padding: 24px; } }
    </style>
    <link rel="stylesheet" href="premium-style.css">
    <link rel="stylesheet" href="cosmic-system.css">
</head>
<body>
    <div class="page-wrap">
        <div class="form-card">
            <h1>Data Analytics & Dashboards Inquiry</h1>
            <p class="description">Please complete the inquiry form below and our team will follow up within 24-48 hours.</p>
            <form id="serviceInquiryForm" class="form-grid" novalidate>
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="fullName" class="form-input" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" name="phone" class="form-input" placeholder="+91 98765 43210" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Company Name</label>
                    <input type="text" name="company" class="form-input" placeholder="Company or brand name">
                </div>
                <div class="form-group">
                    <label class="form-label">Dashboard Type</label>
                    <input type="text" name="dashboardType" class="form-input" placeholder="Dashboard Type">
                </div>
                <div class="form-group">
                    <label class="form-label">Data Source</label>
                    <input type="text" name="dataSource" class="form-input" placeholder="Data Source">
                </div>
                <div class="form-group">
                    <label class="form-label">Business Goal</label>
                    <textarea name="goal" class="form-textarea" placeholder="Business Goal"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Project Description</label>
                    <textarea name="description" class="form-textarea" placeholder="Project Description"></textarea>
                </div>
                <button type="submit" class="form-submit">Submit Inquiry</button>
                <div id="formSuccess" class="message success">Thank you! Your inquiry has been submitted and we will contact you soon.</div>
                <div id="formError" class="message error">Please complete all required fields before submitting.</div>
            </form>
        </div>
    </div>
    <script src="cosmic-effects.js"></script>
    <script src="premium-animations.js"></script>
    <script src="service-email.js"></script>
</body>
</html>
