<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Edit Contact - Elevixor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root{--brand:#60a5fa;--bg:#071029}
        body{background:var(--bg);color:#e6eef8;font-family:Poppins, sans-serif;margin:0;padding:36px}
        .wrap{max-width:720px;margin:20px auto}
        .card{background:rgba(15,23,42,0.95);padding:22px;border-radius:14px;border:1px solid rgba(96,165,250,0.06);box-shadow:0 20px 50px rgba(2,6,23,0.6)}
        h1{color:var(--brand);margin:0 0 8px 0}
        label{display:block;color:#94a3b8;margin-bottom:6px;font-size:13px}
        input{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(148,163,184,0.06);background:rgba(2,6,23,0.5);color:#e6eef8;margin-bottom:12px}
        .btn{display:inline-block;padding:12px 18px;border-radius:12px;background:var(--brand);color:#021025;font-weight:800;text-decoration:none;border:none;cursor:pointer}
        .muted{color:#94a3b8}
    </style>
    <link rel="stylesheet" href="/premium-style.css" />
</head>
<body>
    <div class="wrap">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div>
                <div class="muted">Dashboard</div>
                <h1>Edit Contact</h1>
            </div>
            <div><a href="#" id="backBtn" class="muted">← Back</a></div>
        </div>

        <div class="card">
            <label>Gmail</label>
            <input id="email" type="text" />
            <label>Contact No</label>
            <input id="contact" type="text" />
            <label>WhatsApp No</label>
            <input id="whatsapp" type="text" />

            <div style="margin-top:12px">
                <button id="saveBtn" class="btn">Save Contact</button>
                <a href="index.html" style="margin-left:12px;color:var(--brand);text-decoration:none">Cancel</a>
            </div>
        </div>
    </div>

    <script>
        (function(){
            const email = document.getElementById('email');
            const contact = document.getElementById('contact');
            const whatsapp = document.getElementById('whatsapp');

            email.value = localStorage.getItem('userEmail') || sessionStorage.getItem('userEmail') || '';
            contact.value = localStorage.getItem('userContact') || '';
            whatsapp.value = localStorage.getItem('userWhatsApp') || '';

            document.getElementById('saveBtn').addEventListener('click', function(){
                localStorage.setItem('userEmail', email.value || '');
                localStorage.setItem('userContact', contact.value || '');
                localStorage.setItem('userWhatsApp', whatsapp.value || '');
                alert('Contact saved');
                window.location = 'index.html';
            });

            const backBtn = document.getElementById('backBtn');
            backBtn && backBtn.addEventListener('click', function(e){
                e.preventDefault();
                if(window.opener && !window.opener.closed){ try{ window.opener.focus(); }catch(err){} window.close(); }
                else { window.location = 'index.html'; }
            });
        })();
    </script>
    <script src="/premium-animations.js"></script>
</body>
</html>
