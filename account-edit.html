<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Edit Account - Elevixor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root{--brand:#60a5fa;--bg:#071029}
        body{background:var(--bg);color:#e6eef8;font-family:Poppins, sans-serif;margin:0;padding:36px}
        .wrap{max-width:720px;margin:20px auto}
        .card{background:rgba(15,23,42,0.95);padding:22px;border-radius:14px;border:1px solid rgba(96,165,250,0.06);box-shadow:0 20px 50px rgba(2,6,23,0.6)}
        h1{color:var(--brand);margin:0 0 8px 0}
        label{display:block;color:#94a3b8;margin-bottom:6px;font-size:13px}
        input{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(148,163,184,0.06);background:rgba(2,6,23,0.5);color:#e6eef8;margin-bottom:12px}
        .avatar-circle{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:36px;overflow:hidden;margin-bottom:16px;cursor:pointer}
        .avatar-circle img{width:100%;height:100%;object-fit:cover}
        .photo-button{display:inline-block;padding:10px 16px;border-radius:12px;border:1px solid rgba(96,165,250,0.4);background:transparent;color:var(--brand);cursor:pointer;text-decoration:none;margin-bottom:16px}
        .btn{display:inline-block;padding:12px 18px;border-radius:12px;background:var(--brand);color:#021025;font-weight:800;text-decoration:none;border:none;cursor:pointer}
        .muted{color:#94a3b8}
    </style>
    <link rel="stylesheet" href="/premium-style.css" />
</head>
<body>
    <div class="wrap">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div>
                <div class="muted">Dashboard</div>
                <h1>Edit Account</h1>
            </div>
            <div><a href="#" id="backBtn" class="muted">← Back</a></div>
        </div>

        <div id="accountMessage" class="card" style="display:none; text-align:center;">
            <h2>Signed Out</h2>
            <p class="muted" style="margin-bottom:16px;">You are signed out. Sign in to view and edit your account details.</p>
            <a href="login.html" class="btn" style="background:transparent;color:var(--brand);border:1px solid rgba(96,165,250,0.35);">Sign In</a>
        </div>

        <div id="accountForm" class="card">
            <div style="display:flex;flex-direction:column;align-items:center;text-align:center;">
                <div class="avatar-circle" id="accountAvatar"><span id="accountAvatarInitial">U</span></div>
                <button id="changePhotoBtn" type="button" class="photo-button">Change Photo</button>
                <input id="accountAvatarInput" type="file" accept="image/*" style="display:none" />
            </div>
            <label>Login Email</label>
            <input id="loginEmail" type="email" />
            <label>Change Password (optional)</label>
            <input id="loginPass" type="password" />

            <div style="margin-top:12px; display:flex; flex-wrap:wrap; gap:10px; align-items:center">
                <button id="saveBtn" class="btn">Save Account</button>
                <button id="logoutBtn" class="btn" style="background:transparent;color:var(--brand);border:1px solid rgba(96,165,250,0.35);">Logout</button>
                <a href="#" id="cancelBtn" style="color:var(--brand);text-decoration:none;align-self:center">Cancel</a>
            </div>
        </div>
    </div>

    <script>
        (function(){
            const accountForm = document.getElementById('accountForm');
            const accountMessage = document.getElementById('accountMessage');
            const loginEmail = document.getElementById('loginEmail');
            const isLoggedIn = sessionStorage.getItem('loggedIn') === 'true' || localStorage.getItem('loggedIn') === 'true';

            if(!isLoggedIn) {
                accountForm.style.display = 'none';
                accountMessage.style.display = 'block';
            } else {
                accountMessage.style.display = 'none';
                accountForm.style.display = 'block';
                loginEmail.value = sessionStorage.getItem('userEmail') || localStorage.getItem('userEmail') || '';
            }

            const accountAvatar = document.getElementById('accountAvatar');
            const accountAvatarInitial = document.getElementById('accountAvatarInitial');
            const changePhotoBtn = document.getElementById('changePhotoBtn');
            const accountAvatarInput = document.getElementById('accountAvatarInput');
            const savedAvatar = localStorage.getItem('userAvatarData');
            if(savedAvatar){ accountAvatar.innerHTML = '<img src="'+savedAvatar+'" alt="avatar">'; accountAvatarInitial.style.display='none'; }
            changePhotoBtn && changePhotoBtn.addEventListener('click', function(){ accountAvatarInput.click(); });
            accountAvatar && accountAvatar.addEventListener('click', function(){ accountAvatarInput.click(); });
            accountAvatarInput && accountAvatarInput.addEventListener('change', function(e){
                const file = e.target.files && e.target.files[0]; if(!file) return;
                const reader = new FileReader();
                reader.onload = function(ev){
                    const url = ev.target.result;
                    localStorage.setItem('userAvatarData', url);
                    accountAvatar.innerHTML = '<img src="'+url+'" alt="avatar">';
                    accountAvatarInitial.style.display = 'none';
                };
                reader.readAsDataURL(file);
            });

            document.getElementById('saveBtn').addEventListener('click', function(){
                if(!isLoggedIn) return;
                localStorage.setItem('userEmail', loginEmail.value || '');
                alert('Account settings saved');
                window.location = 'index.html';
            });

            const logoutBtn = document.getElementById('logoutBtn');
            logoutBtn && logoutBtn.addEventListener('click', function(){
                sessionStorage.removeItem('loggedIn');
                localStorage.removeItem('loggedIn');
                sessionStorage.removeItem('userEmail');
                localStorage.removeItem('userEmail');
                if(window.opener && !window.opener.closed){
                    try{
                        window.opener.localStorage.removeItem('loggedIn');
                        window.opener.localStorage.removeItem('userEmail');
                        window.opener.sessionStorage.removeItem('loggedIn');
                        window.opener.sessionStorage.removeItem('userEmail');
                        window.opener.location.reload();
                        window.opener.focus();
                    }catch(err){}
                    window.close();
                    return;
                }
                alert('Logged out successfully');
                window.location = 'index.html';
            });

            const backBtn = document.getElementById('backBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            const closePage = function(e){
                e.preventDefault();
                if(window.opener && !window.opener.closed){ try{ window.opener.focus(); }catch(err){} window.close(); }
                else { window.location = 'index.html'; }
            };
            backBtn && backBtn.addEventListener('click', closePage);
            cancelBtn && cancelBtn.addEventListener('click', closePage);
        })();
    </script>
    <script src="/premium-animations.js"></script>
</body>
</html>
