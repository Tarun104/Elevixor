<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Edit Profile - Elevixor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root{--brand:#60a5fa;--bg:#071029;--card:rgba(15,23,42,0.95)}
        body{background:var(--bg);color:#e6eef8;font-family:Poppins, sans-serif;margin:0;padding:36px}
        .container{max-width:880px;margin:28px auto}
        .card{background:var(--card);padding:22px;border-radius:14px;border:1px solid rgba(96,165,250,0.06);box-shadow:0 20px 50px rgba(2,6,23,0.6)}
        h1{color:var(--brand);margin:0 0 8px 0;font-size:22px}
        .row{display:flex;gap:20px;align-items:flex-start}
        .left{width:220px}
        .avatar-large{width:160px;height:160px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,var(--brand),#3b82f6);display:flex;align-items:center;justify-content:center;font-size:36px;color:white;cursor:pointer}
        .avatar-large img{width:100%;height:100%;object-fit:cover}
        label{display:block;color:#94a3b8;margin-bottom:6px;font-size:13px}
        input[type=text], input[type=number]{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(148,163,184,0.06);background:rgba(2,6,23,0.5);color:#e6eef8;margin-bottom:12px}
        .btn{display:inline-block;padding:12px 18px;border-radius:12px;background:var(--brand);color:#021025;font-weight:800;text-decoration:none;border:none;cursor:pointer}
        .muted{color:#94a3b8;font-size:13px}
        .actions{margin-top:12px;display:flex;gap:10px}
        .back{color:var(--brand);text-decoration:none}
    </style>
    <link rel="stylesheet" href="/premium-style.css" />
</head>
<body>
    <div class="container">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
            <div>
                <div style="color:#94a3b8;font-size:13px">Dashboard</div>
                <h1>Edit Profile</h1>
            </div>
            <div><a href="#" id="backBtn" class="back">← Back to site</a></div>
        </div>

        <div class="card">
            <div class="row">
                <div class="left">
                    <div class="avatar-large" id="editAvatar"><span id="editAvatarInitial">T</span></div>
                    <div style="margin-top:10px">
                        <button id="chooseAvatar" class="btn" style="background:transparent;border:1px solid rgba(96,165,250,0.14);color:var(--brand)">Change Photo</button>
                    </div>
                    <input type="file" id="avatarInput" accept="image/*" style="display:none" />
                </div>

                <div style="flex:1">
                    <label>First Name</label>
                    <input id="first" type="text" />
                    <label>Last Name</label>
                    <input id="last" type="text" />
                    <label>Age</label>
                    <input id="age" type="number" />
                    <label>Gender</label>
                    <input id="gender" type="text" />

                    <div class="actions">
                        <button id="saveBtn" class="btn">Save Profile</button>
                        <a href="index.html" class="muted" style="align-self:center">Cancel</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function(){
            const first = document.getElementById('first');
            const last = document.getElementById('last');
            const age = document.getElementById('age');
            const gender = document.getElementById('gender');
            const avatarInput = document.getElementById('avatarInput');
            const choose = document.getElementById('chooseAvatar');
            const editAvatar = document.getElementById('editAvatar');
            const editAvatarInitial = document.getElementById('editAvatarInitial');

            first.value = localStorage.getItem('userFirstName') || '';
            last.value = localStorage.getItem('userLastName') || '';
            age.value = localStorage.getItem('userAge') || '';
            gender.value = localStorage.getItem('userGender') || '';

            const saved = localStorage.getItem('userAvatarData');
            if(saved){ editAvatar.innerHTML = '<img src="'+saved+'" alt="avatar"/>'; editAvatarInitial.style.display='none'; }

            choose.addEventListener('click', ()=> avatarInput.click());
            editAvatar.addEventListener('click', ()=> avatarInput.click());
            avatarInput.addEventListener('change', (e)=>{
                const file = e.target.files && e.target.files[0]; if(!file) return;
                const r = new FileReader(); r.onload = function(ev){ localStorage.setItem('userAvatarData', ev.target.result); editAvatar.innerHTML = '<img src="'+ev.target.result+'"/>' };
                r.readAsDataURL(file);
            });

            document.getElementById('saveBtn').addEventListener('click', function(){
                localStorage.setItem('userFirstName', first.value || '');
                localStorage.setItem('userLastName', last.value || '');
                localStorage.setItem('userAge', age.value || '');
                localStorage.setItem('userGender', gender.value || '');
                alert('Profile saved');
                window.location = 'index.html';
            });

            // Back button: focus main page and close this tab when possible
            const backBtn = document.getElementById('backBtn');
            backBtn && backBtn.addEventListener('click', function(e){
                e.preventDefault();
                if(window.opener && !window.opener.closed){ try{ window.opener.focus(); }catch(err){} window.close(); }
                else { window.location = 'index.html'; }
            });
        })();
    </script>
    <script src="/premium-animations.js"></script>
</body>
</html>
